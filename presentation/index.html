<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXSTEP Business Proposal - Presentation Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .viewer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        iframe {
            width: 960px;
            /* 10in at 96dpi */
            height: 540px;
            /* 5.625in at 96dpi */
            border: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: #0f172a;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .controls {
            padding: 20px;
            display: flex;
            gap: 20px;
            background: #0f172a;
            width: 100%;
            justify-content: center;
            border-top: 1px solid #1e293b;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
            transition: background 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }

        .slide-counter {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="viewer-container">
        <iframe id="slideFrame" src="slides/slide1.html"></iframe>
    </div>
    <div class="controls">
        <button id="prevBtn" onclick="changeSlide(-1)">Previous</button>
        <div class="slide-counter">Slide <span id="currentSlide">1</span> / 7</div>
        <button id="nextBtn" onclick="changeSlide(1)">Next</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 7;
        const frame = document.getElementById('slideFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counter = document.getElementById('currentSlide');

        function updateUI() {
            frame.src = `slides/slide${currentSlide}.html`;
            counter.innerText = currentSlide;
            prevBtn.disabled = currentSlide === 1;
            nextBtn.disabled = currentSlide === totalSlides;
        }

        function changeSlide(dir) {
            const newSlide = currentSlide + dir;
            if (newSlide >= 1 && newSlide <= totalSlides) {
                currentSlide = newSlide;
                updateUI();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        updateUI();
    </script>
</body>

</html>
