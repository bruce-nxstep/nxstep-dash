    <style>

    <div class="container" style="align-items: center; text-align: center;">

        <div style="margin-top: 60px; width: 200px; height: 4px; background-color: #0ea5e9; border-radius: 2px;"></div>
        <p style="margin-top: 40px; opacity: 0.7; font-size: 14pt;">BUSINESS PROPOSAL & STRATEGY</p>
    </div>

</html>
