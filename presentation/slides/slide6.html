<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>REAL WORLD RESULTS</h2>
            <h1>CASE STUDY: E-COMMERCE</h1>
        </div>

        <div class="content" style="flex-direction: row; align-items: center; gap: 50px;">
            <div style="flex: 1;">
                <p><strong>Client:</strong> Major E-commerce Retailer</p>
                <p><strong>The Challenge:</strong> Manual order processing consumed 4 hours daily per employee.</p>
                <p><strong>The Solution:</strong> End-to-end automated order-to-fulfillment workflow.</p>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                <div style="background: #0ea5e9; padding: 20px; border-radius: 8px; text-align: center;">
                    <div style="font-size: 32pt; font-weight: 800; color: #fff;">
                        <p style="margin:0">100%</p>
                    </div>
                    <div style="font-size: 14pt;">
                        <p style="margin:0">Automation Rate</p>
                    </div>
                </div>
                <div
                    style="background: #1e293b; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #334155;">
                    <div style="font-size: 32pt; font-weight: 800; color: #fff;">
                        <p style="margin:0">0 hrs</p>
                    </div>
                    <div style="font-size: 14pt;">
                        <p style="margin:0">Manual Work</p>
                    </div>
                </div>
                <div
                    style="background: #1e293b; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #334155;">
                    <div style="font-size: 32pt; font-weight: 800; color: #38bdf8;">
                        <p style="margin:0">+20%</p>
                    </div>
                    <div style="font-size: 14pt;">
                        <p style="margin:0">Sales Increase</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
